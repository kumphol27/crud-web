<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายการข้อมูล</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { background:#0f0f14; font-family:'Noto Sans Thai',sans-serif; }
</style>
</head>

<body class="p-6">

<div class="max-w-5xl mx-auto">

<div class="flex justify-between mb-6">
<h1 class="text-white text-xl">รายการข้อมูล</h1>
<button onclick="goAdd()" class="bg-indigo-600 text-white px-4 py-2 rounded">+ เพิ่ม</button>
</div>

<input id="search" onkeyup="loadData()" placeholder="ค้นหา..."
class="w-full mb-6 p-3 bg-[#18181f] text-white rounded">

<div id="list" class="grid md:grid-cols-3 gap-4"></div>

</div>

<script>
const SUPABASE_URL = "https://cicvdydnrgrgjdpeufuc.supabase.co";
const SUPABASE_KEY = "sb_publishable_KRMgo0_VGMTqToKk-Ur-yQ_FUFOgXFm";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadData(){
  const keyword = document.getElementById("search").value;

  let query = db.from("manuals").select("*").order("id",{ascending:false});

  if(keyword){
    query = query.ilike("title", `%${keyword}%`);
  }

  const { data, error } = await query;
  if(error){
    alert(error.message);
    return;
  }

  let html = "";

  data.forEach(item => {

    console.log("IMAGE URL:", item.image_url); // 🔍 debug

    html += `
      <div class="bg-[#18181f] rounded-xl overflow-hidden">

        ${item.image_url 
          ? `<img src="${item.image_url}" class="w-full h-40 object-cover"
               onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">`
          : `<div class="h-40 flex items-center justify-center text-gray-500">No Image</div>`
        }

        <div class="p-4">
          <h3 class="text-white">${item.title}</h3>
          <p class="text-gray-400 text-sm">${item.description || ''}</p>

          <a href="${item.pdf_url || '#'}" target="_blank"
          class="block mt-2 text-center bg-indigo-600 text-white p-2 rounded">
          PDF
          </a>

          <button onclick="del('${item.id}')"
          class="mt-2 w-full bg-red-500 text-white p-2 rounded">
          ลบ
          </button>
        </div>

      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function goAdd(){
  window.location.href="form.html";
}

async function del(id){
  if(!confirm("ลบ?")) return;

  await db.from("manuals").delete().eq("id",id);
  loadData();
}

loadData();
</script>

</body>
</html>
