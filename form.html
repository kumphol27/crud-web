<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เพิ่มข้อมูล</title>
</head>

<body>

<h2>เพิ่มข้อมูล</h2>

<input id="title" placeholder="หัวข้อ"><br><br>
<textarea id="description" placeholder="รายละเอียด"></textarea><br><br>

<input type="file" id="image_url"><br><br>
<input type="file" id="pdf_url"><br><br>

<button onclick="save()">บันทึก</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<script>
async function save() {
  try {
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();

    if (!title) {
      alert("กรุณากรอกหัวข้อ");
      return;
    }

    const imageFile = document.getElementById("image_url").files[0];
    const pdfFile = document.getElementById("pdf_url").files[0];

    let imageUrl = "";
    let pdfUrl = "";

    // 🔥 function แปลงชื่อไฟล์ (ใช้ซ้ำได้)
    const makeSafeName = (name) => {
      return name
        .toLowerCase()
        .replace(/\s+/g, "_")
        .replace(/[^a-z0-9.]/g, "");
    };

    // 🔥 upload image
    if (imageFile) {
      const safeName = makeSafeName(imageFile.name);
      const filePath = `images/${Date.now()}-${safeName}`;

      const { data, error } = await db.storage
        .from("files")
        .upload(filePath, imageFile);

      if (error) throw error;

      imageUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
    }

    // 🔥 upload pdf
    if (pdfFile) {
      const safeName = makeSafeName(pdfFile.name);
      const filePath = `pdf/${Date.now()}-${safeName}`;

      const { data, error } = await db.storage
        .from("files")
        .upload(filePath, pdfFile);

      if (error) throw error;

      pdfUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
    }

    // 🔥 insert database
    const { error } = await db.from("manuals").insert([
      {
        title,
        description,
        image_url: imageUrl,
        pdf_url: pdfUrl
      }
    ]);

    if (error) throw error;

    alert("บันทึกสำเร็จ ✅");
    window.location.href = "index.html";

  } catch (err) {
    console.error(err);
    alert("ERROR: " + err.message);
  }
}
</script>

</body>
</html>
