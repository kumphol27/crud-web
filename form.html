<!doctype html>
<html lang="th" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่ม / แก้ไขข้อมูล</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { background:#0f0f14; font-family:'Noto Sans Thai',sans-serif; }
</style>
</head>

<body class="p-6">

<div class="max-w-lg mx-auto bg-[#18181f] p-6 rounded-xl border border-[#27272a]">

<button onclick="goBack()" class="mb-4 text-gray-400 hover:text-white flex gap-2">
← กลับ
</button>

<h2 id="form-title" class="text-white mb-4">เพิ่มข้อมูล</h2>

<input id="title" placeholder="หัวข้อ"
class="w-full p-3 mb-3 bg-[#0f0f14] border border-[#27272a] text-white rounded">

<textarea id="description" placeholder="รายละเอียด"
class="w-full p-3 mb-4 bg-[#0f0f14] border border-[#27272a] text-white rounded"></textarea>

<!-- preview -->
<img id="preview-img" class="mb-3 rounded hidden" style="max-height:150px;">
<a id="preview-pdf" target="_blank" class="text-blue-400 text-sm hidden">เปิด PDF เดิม</a>

<!-- 📷 IMAGE -->
<label class="block text-sm text-gray-400 mb-1">เลือกรูปภาพ</label>
<input type="file" id="image_url" accept="image/*"
class="mb-4 w-full text-white bg-[#0f0f14] border border-[#27272a] p-2 rounded">

<!-- 📄 PDF -->
<label class="block text-sm text-gray-400 mb-1">เลือก PDF</label>
<input type="file" id="pdf_url" accept="application/pdf"
class="mb-5 w-full text-white bg-[#0f0f14] border border-[#27272a] p-2 rounded">

<button onclick="save()" class="w-full bg-indigo-600 text-white p-3 rounded">
บันทึก
</button>

</div>

<script>
const SUPABASE_URL = "https://cicvdydnrgrgjdpeufuc.supabase.co";
const SUPABASE_KEY = "sb_publishable_KRMgo0_VGMTqToKk-Ur-yQ_FUFOgXFm";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let editId = null;
let oldImage = "";
let oldPdf = "";

/* =======================
   🔙 กลับ
======================= */
function goBack(){
  window.location.href = "index.html";
}

/* =======================
   🔥 โหลดข้อมูล (กรณีแก้ไข)
======================= */
async function loadEditData(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if(!id) return;

  editId = id;
  document.getElementById("form-title").innerText = "แก้ไขข้อมูล";

  const { data, error } = await db.from("manuals").select("*").eq("id", id).single();

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("title").value = data.title;
  document.getElementById("description").value = data.description;

  oldImage = data.image_url;
  oldPdf = data.pdf_url;

  // preview
  if(oldImage){
    const img = document.getElementById("preview-img");
    img.src = oldImage;
    img.classList.remove("hidden");
  }

  if(oldPdf){
    const pdf = document.getElementById("preview-pdf");
    pdf.href = oldPdf;
    pdf.classList.remove("hidden");
  }
}

/* =======================
   🔥 helper
======================= */
function makeSafeName(name){
  return name.toLowerCase()
    .replace(/\s+/g,"_")
    .replace(/[^a-z0-9.]/g,"");
}

/* =======================
   💾 SAVE / UPDATE
======================= */
async function save(){
  try{
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();

    if(!title){
      alert("กรุณากรอกหัวข้อ");
      return;
    }

    const imageFile = document.getElementById("image_url").files[0];
    const pdfFile = document.getElementById("pdf_url").files[0];

    let imageUrl = oldImage;
    let pdfUrl = oldPdf;

    // ✅ upload image ใหม่ (ถ้ามี)
    if(imageFile){
      const path = `images/${Date.now()}-${makeSafeName(imageFile.name)}`;

      const { error } = await db.storage.from("files").upload(path, imageFile);
      if(error) throw error;

      const { data } = db.storage.from("files").getPublicUrl(path);
      imageUrl = data.publicUrl;
    }

    // ✅ upload pdf ใหม่ (ถ้ามี)
    if(pdfFile){
      const path = `pdf/${Date.now()}-${makeSafeName(pdfFile.name)}`;

      const { error } = await db.storage.from("files").upload(path, pdfFile);
      if(error) throw error;

      const { data } = db.storage.from("files").getPublicUrl(path);
      pdfUrl = data.publicUrl;
    }

    // ✅ ถ้าเป็น edit → update
    if(editId){
      const { error } = await db.from("manuals")
        .update({ title, description, image_url: imageUrl, pdf_url: pdfUrl })
        .eq("id", editId);

      if(error) throw error;

      alert("แก้ไขสำเร็จ ✅");
    }
    // ✅ ถ้าเป็น add → insert
    else{
      const { error } = await db.from("manuals").insert([
        { title, description, image_url: imageUrl, pdf_url: pdfUrl }
      ]);

      if(error) throw error;

      alert("เพิ่มข้อมูลสำเร็จ ✅");
    }

    window.location.href = "index.html";

  }catch(err){
    console.error(err);
    alert("ERROR: " + err.message);
  }
}

/* =======================
   INIT
======================= */
loadEditData();
</script>

</body>
</html>
