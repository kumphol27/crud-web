<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เพิ่มข้อมูล</title>
</head>

<body>

<h2>เพิ่มข้อมูล</h2>

<input id="title" placeholder="หัวข้อ"><br><br>
<textarea id="description" placeholder="รายละเอียด"></textarea><br><br>

<input type="file" id="image_url"><br><br>
<input type="file" id="pdf_url"><br><br>

<button onclick="save()">บันทึก</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<script>
async function save() {
  try {
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();

    if (!title) {
      alert("กรุณากรอกหัวข้อ");
      return;
    }

    const imageFile = document.getElementById("image_url").files[0];
    const pdfFile = document.getElementById("pdf_url").files[0];

    let imageUrl = "";
    let pdfUrl = "";

   if (imageFile) {
  const safeName = imageFile.name
    .toLowerCase()
    .replace(/\s+/g, "_")         
    .replace(/[^a-z0-9.]/g, "");   

  const filePath = `images/${Date.now()}-${safeName}`;

  const { data, error } = await db.storage
    .from("files")
    .upload(filePath, imageFile);

  if (error) throw error;

  imageUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
}

    if (pdfFile) {
  const safePdf = pdfFile.name
    .toLowerCase()
    .replace(/\s+/g, "_")
    .replace(/[^a-z0-9.]/g, "");

  const filePath = `pdf/${Date.now()}-${safePdf}`;

  const { data, error } = await db.storage
    .from("files")
    .upload(filePath, pdfFile);

  if (error) throw error;

  pdfUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
}

    // insert
    const { error } = await db.from("manuals").insert([
      { title, description, image_url: imageUrl, pdf_url: pdfUrl }
    ]);

    if (error) throw error;

    alert("บันทึกสำเร็จ");
    window.location.href = "index.html";

  } catch (err) {
    alert(err.message);
    console.error(err);
  }
}
</script>

</body>
</html>
