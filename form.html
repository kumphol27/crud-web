<script>
const db = supabase.createClient(
  "https://cicvdydnrgrgjdpeufuc.supabase.co",
  "sb_publishable_KRMgo0_VGMTqToKk-Ur-yQ_FUFOgXFm"
);

let editId = null;
let oldImages = [];
let oldPdf = "";

/* ======================= */
function goBack(){
  location.href = "index.html";
}

/* ======================= */
async function loadEditData(){
  const id = new URLSearchParams(location.search).get("id");
  if(!id) return;

  editId = id;
  document.getElementById("form-title").innerText = "แก้ไขข้อมูล";

  const { data, error } = await db.from("manuals").select("*").eq("id", id).single();
  if(error) return alert(error.message);

  title.value = data.title;
  description.value = data.description;

  // 🔥 FIX: บังคับให้เป็น array
  if(Array.isArray(data.image_url)){
    oldImages = data.image_url;
  } else if(typeof data.image_url === "string" && data.image_url !== ""){
    oldImages = [data.image_url];
  } else {
    oldImages = [];
  }

  oldPdf = data.pdf_url || "";

  showPreview(oldImages);

  if(oldPdf){
    preview_pdf.href = oldPdf;
    preview_pdf.classList.remove("hidden");
  }
}

/* ======================= */
function showPreview(images){
  const box = document.getElementById("preview-container");
  box.innerHTML = "";

  images.forEach(img=>{
    box.innerHTML += `<img src="${img}" class="preview-img">`;
  });
}

/* ======================= */
function makeSafeName(name){
  return name.toLowerCase()
    .replace(/\s+/g,"_")
    .replace(/[^a-z0-9.]/g,"");
}

/* ======================= */
async function save(){
  try{
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();

    if(!title) return alert("กรุณากรอกหัวข้อ");

    const imageFiles = document.getElementById("image_url").files;
    const pdfFile = document.getElementById("pdf_url").files[0];

    let imageUrls = [...oldImages];
    let pdfUrl = oldPdf;

    /* 🔥 FIX: unique path กันชนกัน */
    for(let i=0;i<imageFiles.length;i++){
      const file = imageFiles[i];

      const path = `images/${crypto.randomUUID()}-${makeSafeName(file.name)}`;

      const { error } = await db.storage.from("files").upload(path, file);
      if(error) throw error;

      const { data } = db.storage.from("files").getPublicUrl(path);
      imageUrls.push(data.publicUrl);
    }

    /* pdf */
    if(pdfFile){
      const path = `pdf/${crypto.randomUUID()}-${makeSafeName(pdfFile.name)}`;

      const { error } = await db.storage.from("files").upload(path, pdfFile);
      if(error) throw error;

      const { data } = db.storage.from("files").getPublicUrl(path);
      pdfUrl = data.publicUrl;
    }

    if(editId){
      const { error } = await db.from("manuals")
        .update({ title, description, image_url: imageUrls, pdf_url: pdfUrl })
        .eq("id", editId);

      if(error) throw error;

      alert("แก้ไขสำเร็จ");
    } else {
      const { error } = await db.from("manuals")
        .insert([{ title, description, image_url: imageUrls, pdf_url: pdfUrl }]);

      if(error) throw error;

      alert("เพิ่มสำเร็จ");
    }

    location.href = "index.html";

  }catch(err){
    console.error(err);
    alert(err.message);
  }
}

loadEditData();
</script>
