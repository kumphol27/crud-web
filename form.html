<!doctype html>
<html lang="th" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่มข้อมูล</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { background:#0f0f14; font-family:'Noto Sans Thai',sans-serif; }
</style>
</head>

<body class="p-6">

<div class="max-w-lg mx-auto bg-[#18181f] p-6 rounded-xl border border-[#27272a]">

<button onclick="goBack()" class="mb-4 text-gray-400 hover:text-white flex gap-2">
← กลับ
</button>

<h2 class="text-white mb-4">เพิ่มข้อมูล</h2>

<input id="title" placeholder="หัวข้อ"
class="w-full p-3 mb-3 bg-[#0f0f14] border border-[#27272a] text-white rounded">

<textarea id="description" placeholder="รายละเอียด"
class="w-full p-3 mb-4 bg-[#0f0f14] border border-[#27272a] text-white rounded"></textarea>

<input type="file" id="image_url" class="mb-3 text-white">
<input type="file" id="pdf_url" class="mb-5 text-white">

<button onclick="save()" class="w-full bg-indigo-600 text-white p-3 rounded">
บันทึก
</button>

</div>

<script>
const SUPABASE_URL = "https://cicvdydnrgrgjdpeufuc.supabase.co";
const SUPABASE_KEY = "sb_publishable_KRMgo0_VGMTqToKk-Ur-yQ_FUFOgXFm";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function goBack(){
  window.location.href = "index.html";
}

function makeSafeName(name){
  return name.toLowerCase()
    .replace(/\s+/g,"_")
    .replace(/[^a-z0-9.]/g,"");
}

async function save(){
  try{
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();

    if(!title){
      alert("กรุณากรอกหัวข้อ");
      return;
    }

    const imageFile = document.getElementById("image_url").files[0];
    const pdfFile = document.getElementById("pdf_url").files[0];

    let imageUrl = "";
    let pdfUrl = "";

    // ✅ upload image
    if(imageFile){
      const path = `images/${Date.now()}-${makeSafeName(imageFile.name)}`;

      const { error } = await db.storage.from("files").upload(path, imageFile);
      if(error) throw error;

      const { data } = db.storage.from("files").getPublicUrl(path);
      imageUrl = data.publicUrl;
    }

    // ✅ upload pdf
    if(pdfFile){
      const path = `pdf/${Date.now()}-${makeSafeName(pdfFile.name)}`;

      const { error } = await db.storage.from("files").upload(path, pdfFile);
      if(error) throw error;

      const { data } = db.storage.from("files").getPublicUrl(path);
      pdfUrl = data.publicUrl;
    }

    // ✅ insert DB
    const { error } = await db.from("manuals").insert([
      { title, description, image_url: imageUrl, pdf_url: pdfUrl }
    ]);

    if(error) throw error;

    alert("บันทึกสำเร็จ ✅");
    window.location.href = "index.html";

  }catch(err){
    console.error(err);
    alert("ERROR: " + err.message);
  }
}
</script>

</body>
</html>
