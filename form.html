<script>
const db = supabase.createClient(
  "https://cicvdydnrgrgjdpeufuc.supabase.co",
  "sb_publishable_KRMgo0_VGMTqToKk-Ur-yQ_FUFOgXFm"
);

async function loadData(){
  const keyword = search.value;

  let query = db.from("manuals").select("*").order("id",{ascending:false});

  if(keyword){
    query = query.ilike("title", `%${keyword}%`);
  }

  const { data, error } = await query;
  if(error) return alert(error.message);

  let html = "";

  if(!data || data.length === 0){
    html = `<p class="text-gray-400">ไม่มีข้อมูล</p>`;
  } else {

    data.forEach(item => {

      // 🔥 FIX รองรับ array
      let images = [];

      if(Array.isArray(item.image_url)){
        images = item.image_url;
      } else if(typeof item.image_url === "string" && item.image_url !== ""){
        images = [item.image_url];
      }

      html += `
        <div class="bg-[#18181f] rounded-xl border border-[#27272a]">

          ${
            images.length > 0
            ? `
              <div class="flex gap-2 overflow-x-auto p-2">
                ${images.map(img => `
                  <img src="${img}"
                    class="h-28 rounded object-cover"
                    onerror="this.src='https://via.placeholder.com/150'">
                `).join("")}
              </div>
            `
            : `<div class="h-40 flex items-center justify-center text-gray-500">No Image</div>`
          }

          <div class="p-4">
            <h3 class="text-white font-semibold">${item.title}</h3>
            <p class="text-gray-400 text-sm mb-3">${item.description || ''}</p>

            <div class="flex gap-2">

              <a href="${item.pdf_url || '#'}" target="_blank"
                class="flex-1 bg-indigo-600 text-white text-xs p-2 rounded text-center">
                PDF
              </a>

              <button onclick="edit('${item.id}')"
                class="flex-1 border border-indigo-500 text-indigo-400 text-xs p-2 rounded">
                แก้ไข
              </button>

              <button onclick="del('${item.id}')"
                class="bg-red-500 text-white px-3 rounded text-xs">
                ลบ
              </button>

            </div>

          </div>

        </div>
      `;
    });
  }

  list.innerHTML = html;
}

function goAdd(){ location.href="form.html"; }
function edit(id){ location.href="form.html?id="+id; }

async function del(id){
  if(!confirm("ลบ?")) return;
  await db.from("manuals").delete().eq("id",id);
  loadData();
}

loadData();
</script>
