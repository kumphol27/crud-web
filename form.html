<!DOCTYPE html>
<html>
<body>

<h2>เพิ่มข้อมูล</h2

<input id="title" placeholder="หัวข้อ"><br>
<textarea id="description"></textarea><br>
<input type="file" id="image_url"><br>
<input type="file" id="pdf_url"><br>

<button onclick="save()">บันทึก</button>

<script src="supabase.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function save() {
  try {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;

    const imageFile = document.getElementById("image_url").files[0];
    const pdfFile = document.getElementById("pdf_url").files[0];

    let imageUrl = "";
    let pdfUrl = "";

    // ✅ upload image
    if (imageFile) {
      const { data, error } = await supabase.storage
        .from("files")
        .upload(`images/${Date.now()}-${imageFile.name}`, imageFile);

      if (error) throw error;

      imageUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
    }

    // ✅ upload pdf
    if (pdfFile) {
      const { data, error } = await supabase.storage
        .from("files")
        .upload(`pdf/${Date.now()}-${pdfFile.name}`, pdfFile);

      if (error) throw error;

      pdfUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
    }

    // ✅ insert database
    const { error } = await supabase.from("manuals").insert([
      {
        title,
        description,
        image_url: imageUrl,
        pdf_url: pdfUrl
      }
    ]);

    if (error) throw error;

    alert("บันทึกสำเร็จ ✅");
    window.location.href = "index.html";

  } catch (err) {
    console.error(err);
    alert("เกิดข้อผิดพลาด: " + err.message);
  }
}
</script>

</body>
</html>
