<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เพิ่มข้อมูล</title>
</head>

<body>

<h2>เพิ่มข้อมูล</h2>

<input id="title" placeholder="หัวข้อ"><br><br>

<textarea id="description" placeholder="รายละเอียด"></textarea><br><br>

<input type="file" id="image_url"><br><br>
<input type="file" id="pdf_url"><br><br>

<button onclick="save()">บันทึก</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function save() {
  try {
    const titleEl = document.getElementById("title");
    const descEl = document.getElementById("description");

    // ✅ กัน null
    if (!titleEl || !descEl) {
      alert("ไม่พบ input ในหน้า");
      return;
    }

    const title = titleEl.value.trim();
    const description = descEl.value.trim();

    if (!title) {
      alert("กรุณากรอกหัวข้อ");
      return;
    }

    const imageInput = document.getElementById("image_url");
    const pdfInput = document.getElementById("pdf_url");

    const imageFile = imageInput.files[0];
    const pdfFile = pdfInput.files[0];

    let imageUrl = "";
    let pdfUrl = "";

    // 🔥 upload image
    if (imageFile) {
      const { data, error } = await supabase.storage
        .from("files")
        .upload(`images/${Date.now()}-${imageFile.name}`, imageFile);

      if (error) throw error;

      imageUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
    }

    // 🔥 upload pdf
    if (pdfFile) {
      const { data, error } = await supabase.storage
        .from("files")
        .upload(`pdf/${Date.now()}-${pdfFile.name}`, pdfFile);

      if (error) throw error;

      pdfUrl = `${SUPABASE_URL}/storage/v1/object/public/${data.path}`;
    }

    // 🔥 insert database
    const { error } = await supabase.from("manuals").insert([
      {
        title: title,
        description: description,
        image_url: imageUrl,
        pdf_url: pdfUrl
      }
    ]);

    if (error) throw error;

    alert("บันทึกสำเร็จ ✅");
    window.location.href = "index.html";

  } catch (err) {
    console.error(err);
    alert("เกิดข้อผิดพลาด: " + err.message);
  }
}
</script>

</body>
</html>
